<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="xterm.css" />
    <script src="xterm.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; background-color: #000; height: 100vh; overflow: hidden; }
        #terminal-container { width: 100vw; height: 100vh; padding: 5px; }
    </style>
</head>
<body>
    <div id="terminal-container"></div>
    <script>
        var term = new Terminal({
            theme: { background: '#000000', foreground: '#00FF00', cursor: '#FFFFFF' },
            fontFamily: 'monospace',
            fontSize: 14,
            cursorBlink: true,
            disableStdin: true // ওয়েবভিউ-এর ইনপুট পুরোপুরি বন্ধ!
        });
        term.open(document.getElementById('terminal-container'));

        window.writeBase64 = function(base64) {
            const binary_string = window.atob(base64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary_string.charCodeAt(i);
            }
            term.write(bytes);
        };
    </script>
</body>
</html>
