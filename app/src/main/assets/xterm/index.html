<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="xterm.css" />
    <script src="xterm.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; background-color: #000; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #terminal-container { flex: 1; padding: 5px; }
        
        /* কোডারদের জন্য এক্সট্রা কীবোর্ড বার এর ডিজাইন */
        #extra-keys { display: flex; background: #1a1a1a; padding: 8px 5px; overflow-x: auto; border-top: 1px solid #333; }
        .key-btn { background: #333; color: #FFF; border: none; padding: 8px 15px; margin: 0 4px; border-radius: 4px; font-family: monospace; font-size: 14px; font-weight: bold; flex-shrink: 0; }
        .key-btn:active { background: #555; }
        
        /* কীবোর্ড ফোকাসের বাগ ফিক্স */
        .xterm-helper-textarea { outline: none; border: none; background: transparent; }
    </style>
</head>
<body>
    <div id="terminal-container"></div>
    
    <div id="extra-keys">
        <button class="key-btn" onclick="sendCtrl('c')">CTRL+C</button>
        <button class="key-btn" onclick="sendKey('\x1b')">ESC</button>
        <button class="key-btn" onclick="sendKey('\x09')">TAB</button>
        <button class="key-btn" onclick="sendKey('-')">-</button>
        <button class="key-btn" onclick="sendKey('/')">/</button>
        <button class="key-btn" onclick="sendKey('\r')">ENTER</button>
    </div>

    <script>
        var term = new Terminal({
            theme: { background: '#000000', foreground: '#00FF00', cursor: '#FFFFFF' },
            fontFamily: 'monospace',
            fontSize: 14,
            cursorBlink: true
        });
        term.open(document.getElementById('terminal-container'));

        // স্ক্রিনে টাচ করলে ফোকাস
        document.getElementById('terminal-container').addEventListener('click', function() {
            term.focus();
        });

        // সাধারণ টাইপিং অ্যান্ড্রয়েডে পাঠানো
        term.onData(e => {
            Android.sendInput(e);
        });

        // C++ থেকে আসা ডেটা স্ক্রিনে দেখানো
        window.writeBase64 = function(base64) {
            const binary_string = window.atob(base64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary_string.charCodeAt(i);
            }
            term.write(bytes);
        };

        // এক্সট্রা বাটনগুলোর ফাংশন
        window.sendKey = function(char) {
            Android.sendInput(char);
            term.focus();
        };
        
        window.sendCtrl = function(char) {
            // CTRL+C (\x03), CTRL+Z (\x1a) ইত্যাদি কনভার্ট করার লজিক
            const ctrlChar = String.fromCharCode(char.charCodeAt(0) - 96);
            Android.sendInput(ctrlChar);
            term.focus();
        };

        // মোবাইলের অরিজিনাল কীবোর্ডের Enter এবং Backspace ফিক্স (IME Bypass)
        term.textarea.addEventListener('keydown', function(e) {
            if (e.keyCode === 13) { 
                Android.sendInput('\r'); // Enter
                e.preventDefault();
            } else if (e.keyCode === 8) { 
                Android.sendInput('\x7f'); // Backspace
                e.preventDefault();
            }
        });

        term.write('Welcome to TermLab Advanced Console\r\n');
    </script>
</body>
</html>
